<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preview Worker</title>
  <!--
    coi-serviceworker enables SharedArrayBuffer (required for wasm-vips Worker path).
    Must be served from the same origin as the page.
  -->
  <script src="./coi-serviceworker.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 16px;
      height: 16px;
      overflow: hidden;
      background: transparent;
    }
    .spinner {
      width: 14px;
      height: 14px;
      margin: 1px;
      border: 2px solid rgba(0,0,0,0.12);
      border-top-color: #4cc9f0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="spinner" title="Generating image previews…"></div>

  <script type="module">
    import { detectFormat }                                                  from './lib/format-detect.js';
    import { canUseStreamingDecode, stageToOPFS, decodeTiff, exportImage, cleanupOPFS, resetVipsWorker } from './lib/tiff-decoder.js';

    /**
     * Post a structured message to the parent frame (if embedded in an iframe).
     * Falls back to console.log if there is no parent.
     */
    function notify(msg) {
      if (window.parent !== window) {
        window.parent.postMessage(msg, '*');
      }
    }

    /**
     * Compute proportional output dimensions capped at 500×500.
     * Images already ≤500 on both sides keep their original size.
     *
     * @param {number} w - source width
     * @param {number} h - source height
     * @returns {{ targetW: number, targetH: number }}
     */
    function computeTargetSize(w, h) {
      if (w <= 500 && h <= 500) return { targetW: w, targetH: h };
      if (w >= h) {
        return { targetW: 500, targetH: Math.round((h * 500) / w) };
      }
      return { targetW: Math.round((w * 500) / h), targetH: 500 };
    }

    /**
     * Generate a JPEG preview blob from a TIFF source using tiff-decoder.js.
     *
     * When OPFS is available, streams the file directly to OPFS and uses the
     * Worker+wasm-vips export path (thumbnailBuffer) — single pass, low peak RAM.
     *
     * Falls back to a full in-memory decode via decodeTiff when OPFS is not
     * available (rare: requires OPFS + Worker + SharedArrayBuffer).
     *
     * @param {string} url - URL of the TIFF file
     * @param {number} srcWidth - original width from meta.json
     * @param {number} srcHeight - original height from meta.json
     * @returns {Promise<{ blob: Blob, width: number, height: number }>}
     */
    async function tiffToJpeg(url, srcWidth, srcHeight) {
      const { targetW, targetH } = computeTargetSize(srcWidth, srcHeight);
      const scale = Math.max(srcWidth / targetW, srcHeight / targetH);

      const response = await fetch(url);
      if (!response.ok) throw new Error(`Fetch failed: ${response.status} ${url}`);

      // Fast path: stream to OPFS once, then export via Worker (no redundant decode).
      if (canUseStreamingDecode()) {
        console.log(`[preview-worker] Staging ${url} to OPFS (scale=${scale.toFixed(1)})…`);
        const opfsFileName = await stageToOPFS(response.body);
        console.log(`[preview-worker] Staged. Exporting thumbnail ${targetW}×${targetH}…`);
        try {
          const result = await exportImage(opfsFileName, { scale, quality: 85, format: 'jpeg' });
          console.log(`[preview-worker] Export done: ${result.width}×${result.height}`);
          return result;
        } finally {
          await cleanupOPFS(opfsFileName);
          // Terminate and recreate the vips Worker after each large TIFF export.
          // wasm linear memory is fixed-size and never shrinks — a second large
          // allocation on the same instance will Abort(). A fresh Worker gives
          // each asset a clean wasm heap (wasm module is browser-cached).
          resetVipsWorker();
        }
      }

      // Fallback: in-memory decode. Collect downscaled rows onto an OffscreenCanvas.
      const buffer = await response.arrayBuffer();

      const canvas = new OffscreenCanvas(targetW, targetH);
      const ctx = canvas.getContext('2d');
      const tempCanvas = new OffscreenCanvas(srcWidth, srcHeight);
      const tempCtx = tempCanvas.getContext('2d');
      const tempImageData = tempCtx.createImageData(srcWidth, srcHeight);

      await decodeTiff(buffer, {
        scale: 1,
        onHeader() {},
        onRow(rowIndex, rgba) {
          const offset = rowIndex * srcWidth * 4;
          tempImageData.data.set(rgba.subarray(0, srcWidth * 4), offset);
        },
        onEnd() {
          tempCtx.putImageData(tempImageData, 0, 0);
          ctx.drawImage(tempCanvas, 0, 0, targetW, targetH);
        },
      });

      const blob = await canvas.convertToBlob({ type: 'image/jpeg', quality: 0.85 });
      return { blob, width: targetW, height: targetH };
    }

    /**
     * Generate a JPEG preview blob for PNG/JPEG/WebP/etc. using
     * createImageBitmap + OffscreenCanvas (zero wasm, fast).
     *
     * @param {string} url
     * @param {number} srcWidth
     * @param {number} srcHeight
     * @returns {Promise<{ blob: Blob, width: number, height: number }>}
     */
    async function nativeToJpeg(url, srcWidth, srcHeight, fmt) {
      const { targetW, targetH } = computeTargetSize(srcWidth, srcHeight);

      const response = await fetch(url);
      if (!response.ok) throw new Error(`Fetch failed: ${response.status} ${url}`);
      let blob = await response.blob();

      // If the detected format is png/jpeg/webp but the blob's type is different (e.g. image/tiff),
      // re-wrap the blob with the correct type so native browser decoders (createImageBitmap) work.
      if (fmt === 'png' && blob.type !== 'image/png') {
        blob = new Blob([await blob.arrayBuffer()], { type: 'image/png' });
      } else if (fmt === 'jpeg' && blob.type !== 'image/jpeg') {
        blob = new Blob([await blob.arrayBuffer()], { type: 'image/jpeg' });
      } else if (fmt === 'webp' && blob.type !== 'image/webp') {
        blob = new Blob([await blob.arrayBuffer()], { type: 'image/webp' });
      }

      const bitmap = await createImageBitmap(blob);

      const canvas = new OffscreenCanvas(targetW, targetH);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(bitmap, 0, 0, targetW, targetH);
      bitmap.close();

      const jpegBlob = await canvas.convertToBlob({ type: 'image/jpeg', quality: 0.85 });
      return { blob: jpegBlob, width: targetW, height: targetH };
    }

    /**
     * Main worker logic: scan store, build queue, process assets.
     */
    async function run() {
      // 1. List all files in the store
      let files;
      try {
        const res = await fetch('/store/');
        if (!res.ok) throw new Error(`GET /store/ failed: ${res.status}`);
        files = await res.json();
      } catch (err) {
        notify({ type: 'error', message: `Cannot list store: ${err.message}` });
        return;
      }

      const fileSet = new Set(files);

      // 2. Find all asset folders via their meta.json
      const queue = [];
      for (const f of files) {
        const match = f.match(/^([^/]+)\/([^/]+)\/assets\/([^/]+)\/meta\.json$/);
        if (!match) continue;
        const [, user, doc, name] = match;

        // Skip if preview already exists
        const previewPath = `${user}/${doc}/assets/${name}/${name}-preview.jpg`;
        if (fileSet.has(previewPath)) continue;

        // Find original image file (not -preview, not .json)
        const originalPath = files.find(orig =>
          orig.startsWith(`${user}/${doc}/assets/${name}/${name}.`) &&
          !orig.endsWith('.json') &&
          !orig.includes('-preview.')
        );
        if (!originalPath) continue;

        queue.push({
          user, doc, name,
          originalUrl: `/store/${originalPath}`,
          metaUrl: `/store/${f}`,
          previewUrl: `/store/${previewPath}`,
          previewName: `${name}-preview.jpg`,
        });
      }

      if (queue.length === 0) {
        notify({ type: 'done', generated: 0 });
        return;
      }

      notify({ type: 'start', total: queue.length });

      let generated = 0;

      for (const asset of queue) {
        try {
          // Load existing meta to get dimensions and mime type
          const metaRes = await fetch(asset.metaUrl);
          if (!metaRes.ok) throw new Error(`Cannot load meta.json: ${metaRes.status}`);
          const meta = await metaRes.json();

          const srcWidth = meta.width || 0;
          const srcHeight = meta.height || 0;
          if (!srcWidth || !srcHeight) throw new Error('Missing dimensions in meta.json');

          // Detect format from first bytes
          const headerRes = await fetch(asset.originalUrl, { headers: { Range: 'bytes=0-11' } });
          const headerBuf = await headerRes.arrayBuffer();
          const fmt = detectFormat(new Uint8Array(headerBuf));
          console.log(`[preview-worker] ${asset.name}: format=${fmt}, ${srcWidth}×${srcHeight}`);

          // Generate JPEG preview
          let result;
          if (fmt === 'tiff') {
            result = await tiffToJpeg(asset.originalUrl, srcWidth, srcHeight);
          } else {
            // PNG, JP2, JPEG, WebP — use native browser decode
            result = await nativeToJpeg(asset.originalUrl, srcWidth, srcHeight, fmt);
          }

          // PUT the JPEG preview file
          const putImageRes = await fetch(asset.previewUrl, {
            method: 'PUT',
            headers: { 'Content-Type': 'image/jpeg' },
            body: result.blob,
          });
          if (!putImageRes.ok) throw new Error(`PUT preview failed: ${putImageRes.status}`);

          // Update meta.json with preview fields
          const updatedMeta = {
            ...meta,
            preview: asset.previewName,
            previewWidth: result.width,
            previewHeight: result.height,
          };
          const putMetaRes = await fetch(asset.metaUrl, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(updatedMeta, null, 2),
          });
          if (!putMetaRes.ok) throw new Error(`PUT meta.json failed: ${putMetaRes.status}`);

          generated++;
          notify({
            type: 'progress',
            assetRef: asset.name,
            docPath: `${asset.user}/${asset.doc}`,
            previewUrl: asset.previewUrl,
            width: result.width,
            height: result.height,
            total: queue.length,
            done: generated,
          });
        } catch (err) {
          // Log the error but continue processing remaining assets
          console.error(`[preview-worker] Failed to process ${asset.name}:`, err);
          notify({ type: 'assetError', assetRef: asset.name, message: err.message });
        }
      }

      notify({ type: 'done', generated });
    }

    run().catch(err => {
      console.error('[preview-worker] Fatal error:', err);
      notify({ type: 'error', message: err.message });
    });
  </script>
</body>
</html>
