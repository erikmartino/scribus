<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Cursor position tests</title>
  <style>
    body { font-family: monospace; margin: 2em; }
    .pass { color: green; }
    .fail { color: red; font-weight: bold; }
    pre { margin: 0 0 0 2em; font-size: 0.9em; }
  </style>
</head>

<body>
  <h1>story-position.js tests</h1>
  <div id="results"></div>

  <script type="module">
    import {
      paraTextLength, moveLeft, moveRight, posToLine,
      positionToPoint, xToPos, pointToPos,
    } from './lib/story-position.js';

    const results = document.getElementById('results');
    let passed = 0, failed = 0;

    function assert(condition, msg, detail) {
      if (condition) {
        passed++;
        results.innerHTML += `<div class="pass">✓ ${msg}</div>`;
      } else {
        failed++;
        results.innerHTML += `<div class="fail">✗ ${msg}</div>`;
        if (detail) results.innerHTML += `<pre>${detail}</pre>`;
      }
    }

    function eq(a, b) { return JSON.stringify(a) === JSON.stringify(b); }

    // --- Test data factories ---
    // LineMap entries now have a `positions` array of { charPos, x }
    // pre-computed by the layout engine. No glyphs/words/hyphToOrig.

    // Simple line: "hello" — 5 chars, each 10px wide, padding=16
    function makeSimpleLine() {
      return {
        lineIndex: 0, paraIndex: 0,
        positions: [
          { charPos: 0, x: 16 },
          { charPos: 1, x: 26 },
          { charPos: 2, x: 36 },
          { charPos: 3, x: 44 },
          { charPos: 4, x: 52 },
          { charPos: 5, x: 62 }, // end of paragraph
        ],
        colX: 0, boxY: 0, boxWidth: 200, boxHeight: 400, y: 30,
      };
    }

    // Ligature line: "ffi" as one glyph 15px wide, sub-glyph hack divides into 5px each
    function makeLigatureLine() {
      return {
        lineIndex: 0, paraIndex: 0,
        positions: [
          { charPos: 0, x: 16 },
          { charPos: 1, x: 21 },
          { charPos: 2, x: 26 },
          { charPos: 3, x: 31 }, // end of paragraph
        ],
        colX: 0, boxY: 0, boxWidth: 200, boxHeight: 400, y: 30,
      };
    }

    // Two words with justified gap: "hi there"
    // h=10, i=8 at x=0; space at x=18; t=8,h=10,e=8,r=8,e=8 at x=48
    function makeJustifiedLine() {
      return {
        lineIndex: 0, paraIndex: 0,
        positions: [
          { charPos: 0, x: 16 },   // h
          { charPos: 1, x: 26 },   // i
          { charPos: 2, x: 34 },   // space
          { charPos: 3, x: 64 },   // t (after justified gap)
          { charPos: 4, x: 72 },   // h
          { charPos: 5, x: 82 },   // e
          { charPos: 6, x: 90 },   // r
          { charPos: 7, x: 98 },   // e
          { charPos: 8, x: 106 },  // end of paragraph
        ],
        colX: 0, boxY: 0, boxWidth: 200, boxHeight: 400, y: 30,
      };
    }

    // Two lines, two paragraphs
    function makeTwoParaLineMap() {
      return [
        {
          lineIndex: 0, paraIndex: 0,
          positions: [
            { charPos: 0, x: 16 }, { charPos: 1, x: 26 }, { charPos: 2, x: 36 },
            { charPos: 3, x: 46 }, { charPos: 4, x: 56 }, { charPos: 5, x: 66 },
          ],
          colX: 0, boxY: 0, boxWidth: 200, boxHeight: 400, y: 30,
        },
        {
          lineIndex: 1, paraIndex: 1,
          positions: [
            { charPos: 0, x: 16 }, { charPos: 1, x: 26 }, { charPos: 2, x: 36 },
            { charPos: 3, x: 46 }, { charPos: 4, x: 56 }, { charPos: 5, x: 66 },
          ],
          colX: 0, boxY: 0, boxWidth: 200, boxHeight: 400, y: 60,
        },
      ];
    }

    // Two boxes at different positions
    function makeTwoBoxLineMap() {
      return [
        {
          lineIndex: 0, paraIndex: 0,
          positions: [
            { charPos: 0, x: 16 }, { charPos: 1, x: 26 }, { charPos: 2, x: 36 },
          ],
          colX: 0, boxY: 0, boxWidth: 100, boxHeight: 200, y: 30,
        },
        {
          lineIndex: 1, paraIndex: 0,
          positions: [
            { charPos: 3, x: 146 }, { charPos: 4, x: 156 }, { charPos: 5, x: 166 },
            { charPos: 6, x: 176 },
          ],
          colX: 130, boxY: 40, boxWidth: 80, boxHeight: 160, y: 70,
        },
      ];
    }

    // Two lines in same paragraph (for line-break boundary test)
    function makeLineBreakMap() {
      return [
        {
          lineIndex: 0, paraIndex: 0,
          positions: [
            { charPos: 0, x: 16 }, { charPos: 1, x: 26 }, { charPos: 2, x: 36 },
            { charPos: 3, x: 46 }, { charPos: 4, x: 56 },
          ],
          colX: 0, boxY: 0, boxWidth: 200, boxHeight: 400, y: 30,
        },
        {
          lineIndex: 1, paraIndex: 0,
          positions: [
            { charPos: 5, x: 16 }, { charPos: 6, x: 26 }, { charPos: 7, x: 36 },
            { charPos: 8, x: 46 }, { charPos: 9, x: 56 }, { charPos: 10, x: 66 },
          ],
          colX: 0, boxY: 0, boxWidth: 200, boxHeight: 400, y: 60,
        },
      ];
    }

    // === Tests ===

    // --- paraTextLength ---
    const story = [
      [{ text: 'hello', style: {} }, { text: ' world', style: {} }],
      [{ text: 'foo', style: {} }],
    ];
    assert(paraTextLength(story, 0) === 11, 'paraTextLength: para 0 = 11');
    assert(paraTextLength(story, 1) === 3, 'paraTextLength: para 1 = 3');

    // --- moveLeft / moveRight ---
    assert(eq(moveRight({ paraIndex: 0, charOffset: 3 }, story), { paraIndex: 0, charOffset: 4 }),
      'moveRight: mid-paragraph');
    assert(eq(moveRight({ paraIndex: 0, charOffset: 11 }, story), { paraIndex: 1, charOffset: 0 }),
      'moveRight: wrap to next paragraph');
    assert(eq(moveRight({ paraIndex: 1, charOffset: 3 }, story), { paraIndex: 1, charOffset: 3 }),
      'moveRight: clamp at end of story');
    assert(eq(moveLeft({ paraIndex: 0, charOffset: 3 }, story), { paraIndex: 0, charOffset: 2 }),
      'moveLeft: mid-paragraph');
    assert(eq(moveLeft({ paraIndex: 1, charOffset: 0 }, story), { paraIndex: 0, charOffset: 11 }),
      'moveLeft: wrap to previous paragraph end');
    assert(eq(moveLeft({ paraIndex: 0, charOffset: 0 }, story), { paraIndex: 0, charOffset: 0 }),
      'moveLeft: clamp at start of story');

    // --- posToLine ---
    const twoParaMap = makeTwoParaLineMap();
    assert(posToLine({ paraIndex: 0, charOffset: 2 }, twoParaMap)?.lineIdx === 0,
      'posToLine: para 0 char 2 → line 0');
    assert(posToLine({ paraIndex: 1, charOffset: 0 }, twoParaMap)?.lineIdx === 1,
      'posToLine: para 1 char 0 → line 1');
    assert(posToLine({ paraIndex: 0, charOffset: 5 }, twoParaMap)?.lineIdx === 0,
      'posToLine: para 0 end → line 0');

    // --- posToLine: line break boundary ---
    const lineBreakMap = makeLineBreakMap();
    assert(posToLine({ paraIndex: 0, charOffset: 4 }, lineBreakMap)?.lineIdx === 0,
      'posToLine: char 4 → line 0 (last char on line 0)');
    assert(posToLine({ paraIndex: 0, charOffset: 5 }, lineBreakMap)?.lineIdx === 1,
      'posToLine: char 5 → line 1 (first char on line 1, not end of line 0)');
    assert(posToLine({ paraIndex: 0, charOffset: 10 }, lineBreakMap)?.lineIdx === 1,
      'posToLine: char 10 → line 1 (end of paragraph)');

    // --- positionToPoint: simple ---
    const simpleLine = makeSimpleLine();
    const pt0 = positionToPoint({ paraIndex: 0, charOffset: 0 }, [simpleLine], 20);
    assert(pt0 !== null && pt0.x === 16, 'positionToPoint: charOffset 0 → x=16',
      `got x=${pt0?.x}`);
    const pt2 = positionToPoint({ paraIndex: 0, charOffset: 2 }, [simpleLine], 20);
    assert(pt2 !== null && pt2.x === 36, 'positionToPoint: charOffset 2 → x=36',
      `got x=${pt2?.x}`);
    const ptEnd = positionToPoint({ paraIndex: 0, charOffset: 5 }, [simpleLine], 20);
    assert(ptEnd !== null && ptEnd.x === 62, 'positionToPoint: charOffset 5 (end) → x=62',
      `got x=${ptEnd?.x}`);

    // --- positionToPoint: ligature ---
    const ligLine = makeLigatureLine();
    const ligPt0 = positionToPoint({ paraIndex: 0, charOffset: 0 }, [ligLine], 20);
    const ligPt1 = positionToPoint({ paraIndex: 0, charOffset: 1 }, [ligLine], 20);
    const ligPt2 = positionToPoint({ paraIndex: 0, charOffset: 2 }, [ligLine], 20);
    assert(ligPt0?.x === 16, 'ligature: charOffset 0 → x=16', `got x=${ligPt0?.x}`);
    assert(ligPt1?.x === 21, 'ligature: charOffset 1 → x=21', `got x=${ligPt1?.x}`);
    assert(ligPt2?.x === 26, 'ligature: charOffset 2 → x=26', `got x=${ligPt2?.x}`);

    // --- positionToPoint: justified gap ---
    const justLine = makeJustifiedLine();
    assert(positionToPoint({ paraIndex: 0, charOffset: 0 }, [justLine], 20)?.x === 16,
      'justified: "h" → x=16');
    assert(positionToPoint({ paraIndex: 0, charOffset: 2 }, [justLine], 20)?.x === 34,
      'justified: space → x=34');
    assert(positionToPoint({ paraIndex: 0, charOffset: 3 }, [justLine], 20)?.x === 64,
      'justified: "t" → x=64 (after gap)');

    // --- xToPos: simple ---
    assert(xToPos(16, simpleLine).charOffset === 0, 'xToPos: x=16 → charOffset 0');
    assert(xToPos(22, simpleLine).charOffset === 1,
      'xToPos: x=22 (right half of char 0) → charOffset 1',
      `got ${xToPos(22, simpleLine).charOffset}`);

    // --- xToPos: ligature ---
    assert(xToPos(17, ligLine).charOffset === 0,
      'xToPos ligature: x=17 (left half of 5px slice) → charOffset 0',
      `got ${xToPos(17, ligLine).charOffset}`);
    assert(xToPos(24, ligLine).charOffset === 2,
      'xToPos ligature: x=24 (right half of second slice) → charOffset 2',
      `got ${xToPos(24, ligLine).charOffset}`);

    // --- pointToPos: box hit-testing ---
    const twoBoxMap = makeTwoBoxLineMap();
    const boxHit1 = pointToPos(20, 30, twoBoxMap);
    assert(boxHit1.charOffset <= 2,
      'pointToPos: click in box 1 → position in box 1',
      `got char=${boxHit1.charOffset}`);
    const boxHit2 = pointToPos(150, 70, twoBoxMap);
    assert(boxHit2.charOffset >= 3,
      'pointToPos: click in box 2 → position in box 2',
      `got char=${boxHit2.charOffset}`);

    // --- Round-trip: positionToPoint → pointToPos ---
    for (let co = 0; co <= 5; co++) {
      const pos = { paraIndex: 0, charOffset: co };
      const pt = positionToPoint(pos, [simpleLine], 20);
      if (pt) {
        const back = pointToPos(pt.x, pt.y + 10, [simpleLine]);
        assert(back.charOffset === co,
          `round-trip: charOffset ${co} → x=${pt.x.toFixed(1)} → charOffset ${back.charOffset}`);
      }
    }

    // --- Summary ---
    results.innerHTML += `<hr><strong>${passed} passed, ${failed} failed</strong>`;
  </script>
</body>

</html>
