<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spread Editor - Spread Layout Component</title>
  <style>
    body {
      margin: 0;
      font-family: "Palatino Linotype", Palatino, serif;
      background: #d9d5cc;
      color: #2f281e;
    }

    .shell {
      max-width: 1220px;
      margin: 0 auto;
      padding: 18px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 8px 12px;
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid #b8ae9e;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
    }

    .controls label {
      font-size: 13px;
      display: block;
    }

    .controls input[type=range] {
      width: 100%;
    }

    #svg-container {
      border: 1px solid #b8ae9e;
      border-radius: 10px;
      background: #d0cbc0;
      min-height: 320px;
      padding: 8px;
      overflow: auto;
    }

    #sample-text {
      display: none;
    }

    .links {
      margin-top: 10px;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="shell">
    <h1>Spread Layout Component</h1>
    <p>Standalone spread geometry + flow component.</p>

    <div class="controls">
      <label>Page width: <span id="page-width-val">420</span>
        <input type="range" id="page-width" min="300" max="680" value="420">
      </label>
      <label>Page height: <span id="page-height-val">560</span>
        <input type="range" id="page-height" min="380" max="840" value="560">
      </label>
      <label>Margin: <span id="margin-val">44</span>
        <input type="range" id="margin" min="20" max="90" value="44">
      </label>
      <label>Gutter: <span id="gutter-val">36</span>
        <input type="range" id="gutter" min="10" max="90" value="36">
      </label>
      <label>Column gap: <span id="col-gap-val">18</span>
        <input type="range" id="col-gap" min="8" max="44" value="18">
      </label>
    </div>

    <div id="svg-container"></div>

    <div id="sample-text">
      <p><n>Spread-layout component preview text.</n></p>
      <p><n>Use this page to isolate page geometry tuning.</n></p>
    </div>

    <div class="links"><a href="../../index.html">Back to spread app</a></div>
  </div>

  <script type="module" src="./main.js"></script>
</body>

</html>
